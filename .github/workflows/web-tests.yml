name: SheSecure Web CI (Selenium)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test-web:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: |
        cd selenium-tests
        npm install

    - name: Validate Selenium Specs Syntax
      run: |
        node -c selenium-tests/tests/*.js

    - name: Archive Test Reports
      uses: actions/upload-artifact@v4
      with:
        name: web-test-reports
        path: reports/web_test_cases_report.xlsx
