          cat TEST_CASES.md >> $GITHUB_STEP_SUMMARY || echo "Test cases table not found"

  validation_tests:
    name: ✅ Validation Tests (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
